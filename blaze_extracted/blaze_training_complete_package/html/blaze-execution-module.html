<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>B.L.A.Z.E. Training — E: Execution</title>
  <style>
    :root{
      --bg:#030006;--card:#080010;--card2:#11001d;--line:rgba(255,255,255,.12);
      --pink:#ff3edb;--purple:#d11eff;--cyan:#00f0ff;--mint:#00ffbf;--text:#f8f2ff;--muted:#bfaed2;
      --warn:#ffd166;--danger:#ff5c8a;
    }
    *{box-sizing:border-box}
    body{margin:0;background:radial-gradient(circle at 15% 0%,rgba(209,30,255,.22),transparent 32%),radial-gradient(circle at 85% 20%,rgba(0,240,255,.16),transparent 30%),linear-gradient(180deg,#030006,#08000f 45%,#030006);font-family:Inter,ui-sans-serif,system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;color:var(--text);min-height:100vh;}
    .wrap{max-width:1180px;margin:0 auto;padding:28px 18px 80px}
    .hero{border:1px solid var(--line);background:linear-gradient(135deg,rgba(209,30,255,.14),rgba(0,240,255,.06)),rgba(8,0,16,.92);border-radius:30px;padding:28px;box-shadow:0 0 55px rgba(209,30,255,.18);position:relative;overflow:hidden}
    .hero:after{content:"";position:absolute;right:-120px;top:-120px;width:300px;height:300px;border-radius:999px;background:radial-gradient(circle,rgba(0,240,255,.22),transparent 65%)}
    .kicker{letter-spacing:.28em;text-transform:uppercase;color:var(--cyan);font-size:12px;font-weight:800;margin-bottom:10px}
    h1{font-size:clamp(38px,8vw,82px);line-height:.88;margin:0 0 12px;font-weight:950;letter-spacing:-.06em}.grad{background:linear-gradient(90deg,var(--pink),var(--purple),var(--cyan),var(--mint));-webkit-background-clip:text;background-clip:text;color:transparent}.subtitle{font-size:clamp(17px,2.4vw,24px);color:#eadcff;max-width:850px;line-height:1.35;margin:0}.grid{display:grid;grid-template-columns:300px 1fr;gap:18px;margin-top:18px}.side,.main,.card{border:1px solid var(--line);background:rgba(8,0,16,.88);border-radius:24px;box-shadow:0 0 36px rgba(0,0,0,.35)}.side{padding:16px;position:sticky;top:14px;height:max-content}.main{padding:22px}.navbtn{display:flex;align-items:center;justify-content:space-between;width:100%;border:1px solid rgba(255,255,255,.1);background:rgba(255,255,255,.035);color:var(--text);border-radius:16px;padding:13px 14px;margin-bottom:10px;cursor:pointer;text-align:left;font-weight:800}.navbtn.active{background:linear-gradient(90deg,rgba(209,30,255,.30),rgba(0,240,255,.14));border-color:rgba(0,240,255,.38)}.tag{font-size:11px;color:var(--mint);letter-spacing:.13em;text-transform:uppercase}.progress{height:12px;background:rgba(255,255,255,.08);border-radius:999px;overflow:hidden;margin:14px 0}.bar{height:100%;background:linear-gradient(90deg,var(--pink),var(--cyan),var(--mint));width:0%;transition:.3s}.stat{font-size:13px;color:var(--muted)}.module-title{font-size:36px;line-height:1;margin:0 0 8px;letter-spacing:-.04em}.lesson{color:#e9dfff;font-size:18px;line-height:1.6}.cards{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:14px;margin:18px 0}.card{padding:18px}.card h3{margin:0 0 8px;font-size:20px}.card p{color:var(--muted);line-height:1.5;margin:0}.pill{display:inline-flex;gap:8px;align-items:center;padding:8px 11px;border-radius:999px;background:rgba(0,240,255,.08);border:1px solid rgba(0,240,255,.22);color:var(--cyan);font-size:12px;font-weight:900;text-transform:uppercase;letter-spacing:.12em}.prompt{margin-top:16px;padding:18px;border-radius:22px;background:linear-gradient(135deg,rgba(255,62,219,.12),rgba(0,240,255,.07));border:1px solid rgba(255,255,255,.11)}label{display:block;color:var(--cyan);font-size:12px;font-weight:900;letter-spacing:.14em;text-transform:uppercase;margin:14px 0 8px}textarea,input{width:100%;border-radius:16px;border:1px solid rgba(255,255,255,.13);background:rgba(0,0,0,.38);color:var(--text);padding:13px 14px;font-size:15px;outline:none}textarea{min-height:110px;resize:vertical}.actions{display:flex;flex-wrap:wrap;gap:10px;margin-top:16px}.btn{border:none;border-radius:16px;padding:13px 16px;font-weight:950;cursor:pointer;color:#050009;background:linear-gradient(90deg,var(--pink),var(--cyan));box-shadow:0 0 22px rgba(0,240,255,.22)}.btn.secondary{background:rgba(255,255,255,.07);color:var(--text);border:1px solid rgba(255,255,255,.14);box-shadow:none}.quote{font-size:24px;line-height:1.25;font-weight:950;margin:0;padding:18px;border-left:4px solid var(--pink);background:rgba(255,255,255,.035);border-radius:16px}.checkrow{display:grid;gap:10px;margin-top:14px}.check{display:flex;gap:10px;align-items:flex-start;padding:12px;border:1px solid rgba(255,255,255,.1);border-radius:16px;background:rgba(255,255,255,.035)}.check input{width:auto;margin-top:3px}.small{font-size:13px;color:var(--muted);line-height:1.45}.badge{display:inline-block;border:1px solid rgba(0,255,191,.34);background:rgba(0,255,191,.08);color:var(--mint);padding:6px 9px;border-radius:999px;font-size:12px;font-weight:900;margin-right:6px;margin-bottom:6px}.footer-lock{margin-top:20px;padding:22px;border-radius:24px;background:linear-gradient(135deg,rgba(209,30,255,.16),rgba(0,255,191,.08));border:1px solid rgba(0,255,191,.2)}@media(max-width:860px){.grid{grid-template-columns:1fr}.side{position:relative;top:0}.cards{grid-template-columns:1fr}.hero{padding:22px}.main{padding:18px}}
  </style>
</head>
<body>
<div class="wrap">
  <section class="hero">
    <div class="kicker">B.L.A.Z.E. Framework Training</div>
    <h1><span class="grad">E — Execution</span></h1>
    <p class="subtitle">Stop overthinking. Move fast. Create proof. Execution is where identity becomes evidence — the moment your stand becomes a rep, a result, and a new standard.</p>
  </section>
  <div class="grid">
    <aside class="side">
      <div class="pill">Execution Module</div>
      <div class="progress"><div id="progressBar" class="bar"></div></div>
      <div id="progressText" class="stat">0% complete</div>
      <hr style="border-color:rgba(255,255,255,.08);margin:16px 0">
      <button class="navbtn active" data-page="0">1. Execution Is Evidence <span>→</span></button>
      <button class="navbtn" data-page="1">2. Kill Overthinking <span>→</span></button>
      <button class="navbtn" data-page="2">3. Build Proof Reps <span>→</span></button>
      <button class="navbtn" data-page="3">4. Track the Scoreboard <span>→</span></button>
      <button class="navbtn" data-page="4">5. Finish What You Start <span>→</span></button>
      <button class="navbtn" data-page="5">6. Execution Lock-In <span>→</span></button>
      <div class="small" style="margin-top:14px">Saved automatically in this browser.</div>
    </aside>
    <main class="main" id="app"></main>
  </div>
</div>
<script>
const STORAGE_KEY='blaze_execution_module_v1';
const pages=[
{title:'Execution Is Evidence',tag:'Core Lesson',html:`<p class="lesson"><b>Execution is the final letter because nothing becomes real until it moves.</b> Being chooses the identity. Leadership directs the day. Alignment removes friction. Zeal brings fire. But Execution creates evidence.</p><p class="lesson">In the book, B.L.A.Z.E. is described as the engine that helps people stop overthinking, move fast, break goals into trackable wins, and finish what they start. This module turns that into practice.</p><p class="quote">Execution is where the future stops being a fantasy and becomes a receipt.</p><div class="cards"><div class="card"><h3>Intention is not proof.</h3><p>Wanting it, thinking about it, talking about it, and planning it are not the same as moving.</p></div><div class="card"><h3>Proof changes identity.</h3><p>Every completed rep tells your nervous system: “This is who I am now.”</p></div></div>`,fields:[['identity','Who are you becoming through execution?'],['oldPattern','What pattern of overthinking or delay are you done repeating?']]},
{title:'Kill Overthinking',tag:'Decision Drill',html:`<p class="lesson">Overthinking usually pretends to be intelligence. But most of the time, it is fear looking for a better costume. The execution move is simple: reduce the decision, choose the next rep, and move before fear builds a case.</p><div class="cards"><div class="card"><h3>The 3-Minute Rule</h3><p>When the next step is obvious, give yourself three minutes to start. Not finish. Start.</p></div><div class="card"><h3>The One-Rep Rule</h3><p>When the full task feels heavy, shrink it to one proof rep: one call, one page, one pitch, one message, one workout set.</p></div></div><div class="prompt"><b>Execution Script:</b><br>“I do not need perfect certainty. I need one clean rep.”</div>`,fields:[['nextRep','What is the smallest proof rep you can complete today?'],['ifThen','Create an if–then plan: If I start overthinking, then I will...']]},
{title:'Build Proof Reps',tag:'Behavior Stack',html:`<p class="lesson">Proof reps are the bridge between who you say you are and who you are becoming. You are not trying to transform your whole life in one heroic push. You are stacking evidence.</p><div class="checkrow"><label>Choose your proof rep type</label><div class="check"><input type="checkbox" data-check="sales"><div><b>Sales Rep</b><div class="small">One pitch, one follow-up, one objection roleplay, one CRM update.</div></div></div><div class="check"><input type="checkbox" data-check="health"><div><b>Health Rep</b><div class="small">One walk, one workout, one clean meal, one stretch session.</div></div></div><div class="check"><input type="checkbox" data-check="creation"><div><b>Creation Rep</b><div class="small">One page, one post, one module, one asset, one recorded idea.</div></div></div><div class="check"><input type="checkbox" data-check="leadership"><div><b>Leadership Rep</b><div class="small">One hard conversation, one standard set, one team message, one coaching moment.</div></div></div></div>`,fields:[['proofRep','Write the exact proof rep you will complete.'],['evidence','What will count as evidence that it is done?']]},
{title:'Track the Scoreboard',tag:'Numbers Create Clarity',html:`<p class="lesson">Execution becomes powerful when it becomes trackable. If you know the rep, the number, the target, and the follow-through, you stop guessing and start leading the game.</p><div class="cards"><div class="card"><h3>Lag Measure</h3><p>The result you want: sales, income, weight lost, pages finished, deals closed.</p></div><div class="card"><h3>Lead Measure</h3><p>The reps you control: doors knocked, calls made, workouts done, pages written, follow-ups sent.</p></div></div><p class="quote">You do not control every outcome. You control the reps that make the outcome inevitable.</p>`,fields:[['lag','What is the result you want?'],['lead','What controllable reps create that result?'],['scoreboard','What number will you track daily?']]},
{title:'Finish What You Start',tag:'Completion Energy',html:`<p class="lesson">Most people do not lose because they lack dreams. They lose because they leak completion. They start, stall, restart, overthink, and abandon. Execution trains a different identity: the finisher.</p><div class="cards"><div class="card"><h3>Completion beats intensity.</h3><p>Do not worship the emotional high of starting. Build the standard of finishing.</p></div><div class="card"><h3>Close the loop.</h3><p>Every open loop drains confidence. Every closed loop builds trust with yourself.</p></div></div><div class="prompt">Ask: “What would the finisher version of me close today?”</div>`,fields:[['openLoop','What open loop needs to be closed?'],['finishLine','What does finished look like today?'],['standard','What standard are you installing by finishing this?']]},
{title:'Execution Lock-In',tag:'Final Integration',html:`<p class="lesson">Now bring the full pillar together. Execution is not panic. It is not random hustle. It is clean, fast, trackable movement from the person you are choosing to be.</p><div class="footer-lock"><h3>Your Execution Statement</h3><p class="small">Use this as the final lock-in for the E pillar.</p><p><span class="badge">Choose</span><span class="badge">Move</span><span class="badge">Track</span><span class="badge">Finish</span><span class="badge">Prove</span></p></div>`,fields:[['statement','Complete this: I execute because...'],['today','Today, I will prove it by...'],['tomorrow','Tomorrow, I will continue by...']]}
];
let state=JSON.parse(localStorage.getItem(STORAGE_KEY)||'{}');
let current=0;
function save(){localStorage.setItem(STORAGE_KEY,JSON.stringify(state));renderProgress();}
function render(){const p=pages[current];document.querySelectorAll('.navbtn').forEach((b,i)=>b.classList.toggle('active',i===current));let fields=(p.fields||[]).map(([key,label])=>`<label>${label}</label><textarea data-field="${key}">${state[key]||''}</textarea>`).join('');document.getElementById('app').innerHTML=`<div class="tag">${p.tag}</div><h2 class="module-title">${p.title}</h2>${p.html}<div class="prompt">${fields}<div class="actions"><button class="btn" id="completeBtn">Mark Page Complete</button><button class="btn secondary" id="nextBtn">Next Page</button><button class="btn secondary" id="resetBtn">Reset Module</button></div></div>`;document.querySelectorAll('[data-field]').forEach(el=>el.addEventListener('input',e=>{state[e.target.dataset.field]=e.target.value;save()}));document.querySelectorAll('[data-check]').forEach(el=>{el.checked=!!state['check_'+el.dataset.check];el.addEventListener('change',e=>{state['check_'+e.target.dataset.check]=e.target.checked;save()})});document.getElementById('completeBtn').onclick=()=>{state['page_'+current]=true;save(); if(current<pages.length-1){current++;render();}};document.getElementById('nextBtn').onclick=()=>{current=Math.min(pages.length-1,current+1);render()};document.getElementById('resetBtn').onclick=()=>{if(confirm('Reset this Execution module?')){state={};save();render();}};renderProgress();}
function renderProgress(){let done=pages.filter((_,i)=>state['page_'+i]).length;let pct=Math.round(done/pages.length*100);document.getElementById('progressBar').style.width=pct+'%';document.getElementById('progressText').textContent=pct+'% complete • '+done+'/'+pages.length+' pages locked';}
document.querySelectorAll('.navbtn').forEach((b,i)=>b.onclick=()=>{current=i;render()});render();
</script>
</body>
</html>
