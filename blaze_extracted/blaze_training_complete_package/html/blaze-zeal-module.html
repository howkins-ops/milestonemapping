<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>B.L.A.Z.E. Training — Z: Zeal</title>
  <style>
    :root{
      --bg:#030308; --card:#090914; --card2:#101025; --pink:#ff3edb; --purple:#d11eff; --cyan:#00f0ff; --mint:#00ffbf; --white:#f2f0f4; --muted:#aaa7bd; --danger:#ff5c7a; --gold:#ffd166;
    }
    *{box-sizing:border-box} body{margin:0;font-family:Inter,system-ui,-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:radial-gradient(circle at top left,rgba(209,30,255,.22),transparent 30%),radial-gradient(circle at top right,rgba(0,240,255,.18),transparent 28%),linear-gradient(180deg,#030308,#050511 45%,#020207);color:var(--white);min-height:100vh} 
    .wrap{max-width:1180px;margin:0 auto;padding:32px 18px 70px}.hero{border:1px solid rgba(255,255,255,.1);border-radius:30px;padding:34px;background:linear-gradient(135deg,rgba(255,62,219,.12),rgba(0,240,255,.08)),rgba(7,7,18,.92);box-shadow:0 0 60px rgba(209,30,255,.22);position:relative;overflow:hidden}.hero:after{content:'Z';position:absolute;right:28px;top:-38px;font-size:220px;font-weight:950;color:rgba(255,255,255,.035);line-height:1}.eyebrow{display:inline-flex;gap:8px;align-items:center;border:1px solid rgba(0,240,255,.35);color:var(--cyan);border-radius:999px;padding:8px 14px;font-size:12px;text-transform:uppercase;letter-spacing:.14em;font-weight:800}.hero h1{font-size:clamp(36px,6vw,78px);line-height:.95;margin:22px 0 16px;letter-spacing:-.06em}.gradient{background:linear-gradient(90deg,var(--pink),var(--purple),var(--cyan),var(--mint));-webkit-background-clip:text;background-clip:text;color:transparent}.hero p{font-size:18px;color:var(--muted);max-width:780px;line-height:1.65}.grid{display:grid;grid-template-columns:300px 1fr;gap:20px;margin-top:22px}.side{position:sticky;top:16px;align-self:start;border:1px solid rgba(255,255,255,.1);border-radius:24px;background:rgba(9,9,20,.86);padding:16px}.tab{width:100%;text-align:left;margin:7px 0;padding:14px;border-radius:16px;border:1px solid rgba(255,255,255,.08);background:rgba(255,255,255,.03);color:var(--white);cursor:pointer;font-weight:800}.tab.active{border-color:rgba(255,62,219,.65);background:linear-gradient(90deg,rgba(255,62,219,.18),rgba(0,240,255,.09));box-shadow:0 0 22px rgba(255,62,219,.16)}.progressBox{margin-top:14px;padding:14px;border-radius:18px;background:#05050d;border:1px solid rgba(255,255,255,.08)}.bar{height:10px;background:#171728;border-radius:999px;overflow:hidden}.fill{height:100%;background:linear-gradient(90deg,var(--pink),var(--cyan),var(--mint));width:0%;transition:.4s}.content{border:1px solid rgba(255,255,255,.1);border-radius:24px;background:rgba(9,9,20,.9);padding:24px;min-height:680px}.page h2{font-size:34px;margin:0 0 10px;letter-spacing:-.03em}.page p,.page li{color:var(--muted);line-height:1.65;font-size:16px}.lesson{padding:18px;border-radius:22px;background:linear-gradient(135deg,rgba(209,30,255,.12),rgba(0,240,255,.06));border:1px solid rgba(255,255,255,.1);margin:16px 0}.cards{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:14px;margin:16px 0}.card{padding:18px;border-radius:22px;background:var(--card2);border:1px solid rgba(255,255,255,.1)}.card h3{margin:0 0 8px;color:var(--white)}.badge{display:inline-block;padding:6px 10px;border-radius:999px;background:rgba(0,240,255,.1);border:1px solid rgba(0,240,255,.25);color:var(--cyan);font-size:12px;font-weight:900;text-transform:uppercase;letter-spacing:.08em}.prompt{margin:18px 0;padding:18px;border-radius:20px;border:1px solid rgba(0,255,191,.28);background:rgba(0,255,191,.06)}textarea,input{width:100%;min-height:92px;border-radius:18px;border:1px solid rgba(255,255,255,.12);background:#05050d;color:var(--white);padding:14px;font-size:15px;outline:none}input{min-height:auto}.actions{display:flex;gap:10px;flex-wrap:wrap;margin-top:16px}.btn{border:0;border-radius:999px;padding:12px 18px;font-weight:950;cursor:pointer;color:#04040a;background:linear-gradient(90deg,var(--pink),var(--cyan));box-shadow:0 0 22px rgba(0,240,255,.16)}.btn.secondary{background:transparent;color:var(--white);border:1px solid rgba(255,255,255,.14);box-shadow:none}.quote{font-size:22px;line-height:1.4;border-left:4px solid var(--pink);padding-left:18px;color:var(--white)}.warning{border-color:rgba(255,92,122,.3);background:rgba(255,92,122,.08)}.gold{border-color:rgba(255,209,102,.35);background:rgba(255,209,102,.07)}.done{border-color:rgba(0,255,191,.4)!important;background:rgba(0,255,191,.09)!important}@media(max-width:850px){.grid{grid-template-columns:1fr}.side{position:relative}.cards{grid-template-columns:1fr}.hero{padding:24px}.content{padding:18px}}
  </style>
</head>
<body>
<div class="wrap">
  <section class="hero">
    <span class="eyebrow">B.L.A.Z.E. Training • Module 4</span>
    <h1>Z — <span class="gradient">Zeal</span></h1>
    <p>Zeal is the intensity switch. It is not fake hype. It is the trained ability to bring fire, conviction, urgency, and emotional commitment to what matters — without burning yourself into the ground.</p>
  </section>
  <main class="grid">
    <aside class="side">
      <button class="tab active" data-page="0">1. Zeal Overview</button>
      <button class="tab" data-page="1">2. Fire vs Hype</button>
      <button class="tab" data-page="2">3. Energy Leadership</button>
      <button class="tab" data-page="3">4. Resilience Reset</button>
      <button class="tab" data-page="4">5. Conviction Drill</button>
      <button class="tab" data-page="5">6. Zeal Lock-In</button>
      <div class="progressBox"><b>Module Progress</b><div class="bar" style="margin-top:10px"><div id="fill" class="fill"></div></div><p id="progressText">0% complete</p></div>
      <button class="btn secondary" onclick="resetModule()" style="margin-top:12px;width:100%">Reset Module</button>
    </aside>
    <section class="content" id="content"></section>
  </main>
</div>
<script>
const key='blaze_zeal_module_v1';
const pages=[
{title:'Zeal Overview: Move With Fire', badge:'Core Lesson', body:`Zeal is the emotional fuel behind B.L.A.Z.E. Being gives you identity. Leadership gives you direction. Alignment gives you integrity. Zeal gives you the fire to move when resistance shows up. The goal is not to be loud. The goal is to be alive, committed, and switched on.`, lesson:`In the book language, the upgraded version moves with Zeal: when things go wrong, you reset, adjust, and move forward. Zeal is not panic. Zeal is powerful presence under pressure.`, cards:[['Zeal is','Conviction, urgency, passion, commitment, emotional charge, courage, and life-force.'],['Zeal is not','Fake positivity, caffeine panic, pressure addiction, reckless action, or burnout disguised as ambition.']], prompt:'Where in your life have you been moving without fire — just going through the motions?', drill:'Write one thing today that deserves more of your energy, not because you are forced, but because it actually matters.'},
{title:'Fire vs Hype', badge:'Discernment', body:`Hype needs a crowd. Fire survives in silence. Hype burns hot and disappears. Fire is connected to meaning. This page teaches the difference between emotional noise and true Zeal.`, lesson:`When you rely on hype, your execution depends on mood. When you build Zeal, your execution is tied to purpose. Zeal says: I know why this matters, so I can bring energy even when it is not convenient.`, cards:[['Hype says','I feel excited right now, so I will move.'],['Zeal says','This matters, so I will move even before I feel ready.'],['Hype collapses when','You get rejected, tired, ignored, judged, or uncomfortable.'],['Zeal strengthens when','You reconnect the action to mission, identity, and the future you are building.']], prompt:'What is one area where you have been confusing hype with real commitment?', drill:'Name one action you will take even when the excitement is gone.'},
{title:'Energy Leadership', badge:'State Training', body:`Your energy enters the room before your words. In sales, coaching, leadership, content, and relationships, people feel the state you are operating from. Zeal trains you to bring clean, powerful energy instead of chaotic pressure.`, lesson:`Energy leadership is not performing. It is taking responsibility for the emotional tone you bring. Before the pitch, the call, the post, the workout, or the hard conversation, you decide: what energy am I bringing into this?`, cards:[['Low Zeal Energy','Flat, hesitant, apologetic, distracted, waiting to be chosen.'],['Clean Zeal Energy','Present, alive, convicted, warm, direct, focused, and grounded.']], prompt:'What energy have you been bringing lately — and what energy would the next-level version of you bring?', drill:'Before your next important action, pause for 20 seconds and choose 3 words for your energy.'},
{title:'Resilience Reset', badge:'Pressure Protocol', body:`Zeal is tested when the day goes sideways. Slow start. Bad call. Rejection. Low numbers. Someone doubts you. Your old pattern wants to spiral. Zeal teaches you to reset faster.`, lesson:`The trained person does not avoid pressure. They recover faster. They do not make a bad moment mean they are a bad person. They reset, adjust, and move forward. That is Zeal under pressure.`, cards:[['Old reaction','Spiral, complain, numb out, blame, quit early, lose presence.'],['Zeal reset','Name it, breathe, learn, recommit, take the next clean rep.']], prompt:'What situation usually steals your fire the fastest?', drill:'Create your reset line: “When ____ happens, I will ____ and take the next rep.”'},
{title:'Conviction Drill', badge:'Embodiment', body:`Conviction is Zeal with a spine. You are not just excited. You are decided. This drill turns vague motivation into a spoken commitment.`, lesson:`Most people wait for certainty before acting. Zeal creates certainty through action. You speak the commitment, take the rep, and collect evidence.`, cards:[['Weak commitment','I will try. I hope. Maybe. If things line up.'],['Zeal commitment','I choose. I will. I am committed to the next rep.']], prompt:'Finish this: “I am no longer available for ______ because I am committed to ______.”', drill:'Say your commitment out loud, then take a 10-minute action that proves it.'},
{title:'Zeal Lock-In', badge:'Completion', body:`You have now built the Zeal layer: fire without chaos, intensity without burnout, urgency without panic. Lock it into a statement you can use before execution.`, lesson:`Zeal becomes powerful when it is repeatable. Your job is to create a personal activation code you can return to before action.`, cards:[['Your Zeal Code','A short statement that reconnects you to energy, mission, and movement.'],['Proof Rep','One immediate action that shows your fire is real.']], prompt:'Write your final Zeal Statement.', drill:'Example: “I bring clean fire to what matters. I do not wait to feel ready. I reset fast, move with conviction, and take the next rep.”'}
];
let state=JSON.parse(localStorage.getItem(key)||'{"page":0,"answers":{},"done":{}}');
function save(){localStorage.setItem(key,JSON.stringify(state));updateProgress();}
function render(){const p=pages[state.page];document.querySelectorAll('.tab').forEach((b,i)=>{b.classList.toggle('active',i===state.page);b.classList.toggle('done',state.done[i]);});document.getElementById('content').innerHTML=`<div class="page"><span class="badge">${p.badge}</span><h2>${p.title}</h2><p>${p.body}</p><div class="lesson"><div class="quote">${p.lesson}</div></div><div class="cards">${p.cards.map(c=>`<div class="card"><h3>${c[0]}</h3><p>${c[1]}</p></div>`).join('')}</div><div class="prompt"><h3>Coaching Prompt</h3><p>${p.prompt}</p><textarea id="answer" placeholder="Write your answer here...">${state.answers[state.page]||''}</textarea></div><div class="prompt gold"><h3>Micro Drill</h3><p>${p.drill}</p></div><div class="actions"><button class="btn" onclick="completePage()">Complete This Page</button><button class="btn secondary" onclick="prevPage()">Previous</button><button class="btn secondary" onclick="nextPage()">Next</button></div></div>`;document.getElementById('answer').addEventListener('input',e=>{state.answers[state.page]=e.target.value;save();});updateProgress();}
function completePage(){state.done[state.page]=true;save(); if(state.page<pages.length-1){state.page++; render();}else{render();}}
function nextPage(){if(state.page<pages.length-1){state.page++;render();}}
function prevPage(){if(state.page>0){state.page--;render();}}
function updateProgress(){const total=pages.length;const done=Object.values(state.done).filter(Boolean).length;const pct=Math.round(done/total*100);document.getElementById('fill').style.width=pct+'%';document.getElementById('progressText').textContent=pct+'% complete';}
function resetModule(){localStorage.removeItem(key);state={page:0,answers:{},done:{}};render();}
document.querySelectorAll('.tab').forEach((b,i)=>b.onclick=()=>{state.page=i;save();render();});render();
</script>
</body>
</html>
