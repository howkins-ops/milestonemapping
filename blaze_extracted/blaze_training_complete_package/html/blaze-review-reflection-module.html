<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>B.L.A.Z.E. Review + Reflection</title>
  <style>
    :root{
      --bg:#030006;--panel:#090012;--panel2:#12001f;--pink:#ff3edb;--purple:#d11eff;--cyan:#00f0ff;--mint:#00ffbf;--text:#f8ecff;--muted:#bda8c9;--danger:#ff4d6d;--gold:#ffd166;
    }
    *{box-sizing:border-box} body{margin:0;font-family:Inter,ui-sans-serif,system-ui,-apple-system,Segoe UI,Roboto,Arial;background:radial-gradient(circle at top left,rgba(209,30,255,.28),transparent 35%),radial-gradient(circle at top right,rgba(0,240,255,.2),transparent 30%),linear-gradient(180deg,#030006,#090012 45%,#030006);color:var(--text);min-height:100vh}
    .wrap{max-width:1180px;margin:0 auto;padding:28px 18px 60px}.hero{border:1px solid rgba(255,255,255,.11);background:linear-gradient(135deg,rgba(18,0,31,.92),rgba(3,0,6,.92));border-radius:28px;padding:28px;box-shadow:0 0 42px rgba(209,30,255,.18);position:relative;overflow:hidden}.hero:before{content:"";position:absolute;inset:-2px;background:linear-gradient(90deg,transparent,rgba(0,240,255,.15),transparent);filter:blur(15px)}.hero>*{position:relative}.kicker{color:var(--cyan);letter-spacing:.18em;text-transform:uppercase;font-weight:800;font-size:12px}.title{font-size:clamp(34px,6vw,76px);line-height:.92;margin:10px 0;background:linear-gradient(90deg,var(--pink),var(--purple),var(--cyan),var(--mint));-webkit-background-clip:text;color:transparent;font-weight:1000}.sub{font-size:18px;color:var(--muted);max-width:850px;line-height:1.55}.grid{display:grid;grid-template-columns:280px 1fr;gap:18px;margin-top:22px}.side{position:sticky;top:18px;align-self:start;border:1px solid rgba(255,255,255,.1);background:rgba(9,0,18,.86);border-radius:22px;padding:14px}.navbtn{width:100%;text-align:left;border:1px solid rgba(255,255,255,.08);background:rgba(255,255,255,.035);color:var(--text);border-radius:16px;padding:13px;margin:6px 0;cursor:pointer;font-weight:800}.navbtn.active{border-color:rgba(0,240,255,.7);box-shadow:0 0 22px rgba(0,240,255,.18);background:linear-gradient(90deg,rgba(209,30,255,.22),rgba(0,240,255,.12))}.card{border:1px solid rgba(255,255,255,.1);background:rgba(9,0,18,.78);border-radius:24px;padding:22px;margin-bottom:16px;box-shadow:0 0 26px rgba(0,0,0,.25)}.h2{font-size:34px;margin:0 0 8px}.p{color:var(--muted);line-height:1.65;font-size:16px}.pillrow{display:flex;flex-wrap:wrap;gap:10px;margin:15px 0}.pill{padding:9px 12px;border-radius:999px;border:1px solid rgba(255,255,255,.13);background:rgba(255,255,255,.04);color:var(--text);font-weight:800;font-size:13px}.pill.hot{border-color:rgba(255,62,219,.7);box-shadow:0 0 18px rgba(255,62,219,.14)}.modulegrid{display:grid;grid-template-columns:repeat(5,1fr);gap:10px}.letter{border:1px solid rgba(255,255,255,.11);background:linear-gradient(180deg,rgba(18,0,31,.88),rgba(3,0,6,.88));border-radius:18px;padding:14px}.letter b{display:block;font-size:34px;background:linear-gradient(90deg,var(--pink),var(--cyan));-webkit-background-clip:text;color:transparent}.letter span{display:block;font-weight:900}.letter small{color:var(--muted);line-height:1.45}.field{margin:14px 0}.field label{display:block;font-weight:900;margin-bottom:7px;color:#fff}.field textarea,.field input,.field select{width:100%;border:1px solid rgba(255,255,255,.14);background:#05000a;color:var(--text);border-radius:16px;padding:13px;font:inherit;outline:none}.field textarea{min-height:96px;resize:vertical}.field textarea:focus,.field input:focus,.field select:focus{border-color:var(--cyan);box-shadow:0 0 18px rgba(0,240,255,.16)}.twocol{display:grid;grid-template-columns:1fr 1fr;gap:14px}.btns{display:flex;gap:10px;flex-wrap:wrap}.btn{border:0;background:linear-gradient(90deg,var(--purple),var(--pink));color:white;border-radius:16px;padding:13px 16px;font-weight:1000;cursor:pointer;box-shadow:0 0 20px rgba(209,30,255,.25)}.btn.secondary{background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.14);box-shadow:none}.btn.cyan{background:linear-gradient(90deg,var(--cyan),var(--mint));color:#020206}.scoregrid{display:grid;grid-template-columns:repeat(5,1fr);gap:10px;margin-top:14px}.score{border:1px solid rgba(255,255,255,.1);background:rgba(255,255,255,.04);border-radius:18px;padding:13px}.score h4{margin:0 0 8px}.range{width:100%}.output{white-space:pre-wrap;background:#030006;border:1px solid rgba(0,240,255,.24);border-radius:18px;padding:16px;min-height:140px;color:#fff}.bar{height:12px;border-radius:999px;background:rgba(255,255,255,.08);overflow:hidden;margin:10px 0}.fill{height:100%;background:linear-gradient(90deg,var(--pink),var(--purple),var(--cyan));width:0%;transition:.3s}.proof{border-left:4px solid var(--mint);padding:12px 14px;background:rgba(0,255,191,.06);border-radius:14px;color:#dffff7}.warn{border-left:4px solid var(--gold);padding:12px 14px;background:rgba(255,209,102,.08);border-radius:14px;color:#fff2c9}.small{font-size:13px;color:var(--muted)}@media(max-width:900px){.grid{grid-template-columns:1fr}.side{position:relative;top:auto}.modulegrid,.scoregrid,.twocol{grid-template-columns:1fr}.title{font-size:44px}}
  </style>
</head>
<body>
<div class="wrap">
  <section class="hero">
    <div class="kicker">B.L.A.Z.E. Integration Chamber</div>
    <h1 class="title">Review + Reflection</h1>
    <p class="sub">This is where the training becomes wisdom. The goal is not to say “I learned B.L.A.Z.E.” The goal is to prove who you became, what changed, what still needs work, and what you will execute next.</p>
    <div class="pillrow"><span class="pill hot">Being</span><span class="pill hot">Leadership</span><span class="pill hot">Alignment</span><span class="pill hot">Zeal</span><span class="pill hot">Execution</span></div>
  </section>
  <div class="grid">
    <aside class="side" id="nav"></aside>
    <main id="content"></main>
  </div>
</div>
<script>
const storeKey='blaze-review-reflection-v1';
let state=JSON.parse(localStorage.getItem(storeKey)||'{}');
const pages=[
 {id:'overview',label:'Overview'}, {id:'score',label:'Blaze Scorecard'}, {id:'reflect',label:'Pillar Reflection'}, {id:'wisdom',label:'Extract Wisdom'}, {id:'gaps',label:'Find The Gap'}, {id:'commit',label:'Next Commitment'}, {id:'recap',label:'Final Recap'}
];
function save(){localStorage.setItem(storeKey,JSON.stringify(state));renderProgress()}
function setVal(k,v){state[k]=v;save()}
function pct(){let keys=['beingScore','leadershipScore','alignmentScore','zealScore','executionScore','beingReflection','leadershipReflection','alignmentReflection','zealReflection','executionReflection','biggestWin','hardestTruth','pattern','gap','nextStandard','commitment','proofRep','deadline'];return Math.round(keys.filter(k=>String(state[k]||'').length>0).length/keys.length*100)}
function renderNav(active='overview'){document.getElementById('nav').innerHTML=`<div class='small'>Progress</div><div class='bar'><div class='fill' style='width:${pct()}%'></div></div><b>${pct()}% complete</b>`+pages.map(p=>`<button class='navbtn ${p.id===active?'active':''}' onclick="render('${p.id}')">${p.label}</button>`).join('')+`<button class='btn secondary' style='width:100%;margin-top:10px' onclick='resetAll()'>Reset</button>`}
function renderProgress(){const fill=document.querySelector('.fill');if(fill)fill.style.width=pct()+'%'}
function input(k,ph,type='textarea'){return `<div class='field'><label>${ph}</label>${type==='input'?`<input value="${state[k]||''}" oninput="setVal('${k}',this.value)" placeholder="Type here..."/>`:`<textarea oninput="setVal('${k}',this.value)" placeholder="Type here...">${state[k]||''}</textarea>`}</div>`}
function score(k,label){return `<div class='score'><h4>${label}</h4><input class='range' type='range' min='1' max='10' value='${state[k]||5}' oninput="setVal('${k}',this.value);this.nextElementSibling.textContent=this.value+'/10'"/><b>${state[k]||5}/10</b></div>`}
const content={
overview:`<section class='card'><h2 class='h2'>The Point of the Review</h2><p class='p'>B.L.A.Z.E. is not meant to stay as a concept. The review makes the system practical. You look at the five pillars and ask: Where did I become someone stronger? Where did I still react from the old pattern? What evidence do I have? What is the next standard?</p><div class='modulegrid'><div class='letter'><b>B</b><span>Being</span><small>Who was I being before action?</small></div><div class='letter'><b>L</b><span>Leadership</span><small>Did I direct myself or react?</small></div><div class='letter'><b>A</b><span>Alignment</span><small>Did my actions match my values?</small></div><div class='letter'><b>Z</b><span>Zeal</span><small>Did I bring clean fire?</small></div><div class='letter'><b>E</b><span>Execution</span><small>What did I actually prove?</small></div></div></section><section class='card'><h2 class='h2'>Review Rule</h2><div class='proof'>Do not judge yourself. Study yourself. A boss does not collapse when the scoreboard is honest. A boss uses the truth to make the next move cleaner.</div></section>`,
score:`<section class='card'><h2 class='h2'>B.L.A.Z.E. Scorecard</h2><p class='p'>Score each pillar honestly from 1–10. This is not about shame. This is awareness. The number tells you where the next breakthrough lives.</p><div class='scoregrid'>${score('beingScore','Being')}${score('leadershipScore','Leadership')}${score('alignmentScore','Alignment')}${score('zealScore','Zeal')}${score('executionScore','Execution')}</div></section><section class='card'><h2 class='h2'>Score Meaning</h2><p class='p'><b>1–3:</b> this pillar needs immediate attention. <b>4–6:</b> awareness exists, but the reps are inconsistent. <b>7–8:</b> strong, but still needs proof under pressure. <b>9–10:</b> this is becoming your standard.</p></section>`,
reflect:`<section class='card'><h2 class='h2'>Pillar Reflection</h2><p class='p'>Answer each one like a coach is sitting across from you and will not let you give a fake answer.</p>${input('beingReflection','B — Being: Who did I choose to be, and where did I fall back into the old identity?')}${input('leadershipReflection','L — Leadership: Where did I lead myself well, and where did I react?')}${input('alignmentReflection','A — Alignment: Where did my actions match my values, and where did they split?')}${input('zealReflection','Z — Zeal: Where did I bring real fire, and where was it just hype, pressure, or panic?')}${input('executionReflection','E — Execution: What did I actually complete, prove, or move forward?')}</section>`,
wisdom:`<section class='card'><h2 class='h2'>Extract The Wisdom</h2><p class='p'>Learning is what happened. Wisdom is what you carry forward. Turn the reps into principles.</p><div class='twocol'>${input('biggestWin','Biggest win: what worked and why?')}${input('hardestTruth','Hardest truth: what did I not want to admit?')}</div>${input('pattern','Pattern: what keeps showing up across the five pillars?')}${input('lesson','Lesson: what is the sentence I need to remember next time pressure hits?')}</section>`,
gaps:`<section class='card'><h2 class='h2'>Find The Gap</h2><p class='p'>The gap is the space between who you say you are and what your evidence currently proves. This is where the next level gets built.</p>${input('gap','What is the biggest B.L.A.Z.E. gap right now?')}${input('cost','What will this gap cost me if I keep ignoring it?')}${input('nextStandard','What is the new standard that closes the gap?')}</section><section class='card'><div class='warn'><b>Coach note:</b> Pick one gap. Not five. The next version of you gets built through focus, not emotional overload.</div></section>`,
commit:`<section class='card'><h2 class='h2'>Next B.L.A.Z.E. Commitment</h2><p class='p'>Now turn reflection into movement. This is the bridge from insight to execution.</p>${input('commitment','My next B.L.A.Z.E. commitment is...')}${input('proofRep','The proof rep I will complete is...')}${input('deadline','Deadline / when I will do it','input')}${input('ifThen','If pressure hits, then I will...')}</section>`,
recap:`<section class='card'><h2 class='h2'>Final Lock-In</h2><p class='p'>Copy this recap into your journal, app profile, or next training checkpoint.</p><div class='output' id='finalOut'></div><div class='btns' style='margin-top:12px'><button class='btn cyan' onclick='copyRecap()'>Copy Recap</button><button class='btn secondary' onclick='downloadRecap()'>Download TXT</button></div></section>`
};
function recap(){return `B.L.A.Z.E. REVIEW + REFLECTION\n\nScores:\nBeing: ${state.beingScore||5}/10\nLeadership: ${state.leadershipScore||5}/10\nAlignment: ${state.alignmentScore||5}/10\nZeal: ${state.zealScore||5}/10\nExecution: ${state.executionScore||5}/10\n\nBiggest Win:\n${state.biggestWin||''}\n\nHardest Truth:\n${state.hardestTruth||''}\n\nPattern:\n${state.pattern||''}\n\nBiggest Gap:\n${state.gap||''}\n\nNew Standard:\n${state.nextStandard||''}\n\nNext Commitment:\n${state.commitment||''}\n\nProof Rep:\n${state.proofRep||''}\n\nDeadline:\n${state.deadline||''}\n\nIf pressure hits, then I will:\n${state.ifThen||''}`}
function render(id='overview'){renderNav(id);document.getElementById('content').innerHTML=content[id];if(id==='recap')document.getElementById('finalOut').textContent=recap()}
function copyRecap(){navigator.clipboard.writeText(recap());alert('B.L.A.Z.E. recap copied.')}
function downloadRecap(){const a=document.createElement('a');a.href=URL.createObjectURL(new Blob([recap()],{type:'text/plain'}));a.download='blaze-review-reflection.txt';a.click()}
function resetAll(){if(confirm('Reset this review?')){state={};save();render('overview')}}
render();
</script>
</body>
</html>
