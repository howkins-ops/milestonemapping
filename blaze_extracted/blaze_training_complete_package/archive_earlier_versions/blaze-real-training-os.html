<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>B.L.A.Z.E. Training OS</title>
<style>
:root{--bg:#05000b;--card:#0b0714;--card2:#11091d;--pink:#ff3edb;--purple:#d11eff;--cyan:#00f0ff;--green:#00ffbf;--white:#f2f0f4;--muted:#aaa0ba;--danger:#ff477e;--line:rgba(255,255,255,.1)}
*{box-sizing:border-box}body{margin:0;background:radial-gradient(circle at 20% 0%,rgba(209,30,255,.22),transparent 30%),radial-gradient(circle at 80% 10%,rgba(0,240,255,.18),transparent 28%),linear-gradient(180deg,#05000b,#080111 50%,#020006);color:var(--white);font-family:Inter,system-ui,-apple-system,Segoe UI,sans-serif;min-height:100vh}.app{display:grid;grid-template-columns:310px 1fr;min-height:100vh}.sidebar{border-right:1px solid var(--line);background:rgba(5,0,11,.88);backdrop-filter:blur(20px);padding:26px;position:sticky;top:0;height:100vh;overflow:auto}.brand{display:flex;gap:14px;align-items:center;margin-bottom:22px}.logo{width:54px;height:54px;border-radius:18px;background:linear-gradient(135deg,var(--purple),var(--pink),var(--cyan));box-shadow:0 0 28px rgba(209,30,255,.55);display:grid;place-items:center;font-weight:950;color:#05000b}.kicker{font-size:12px;letter-spacing:.22em;color:var(--cyan);text-transform:uppercase}.brand h1{font-size:20px;margin:4px 0 0}.progressShell{margin:18px 0 22px}.progressTop{display:flex;justify-content:space-between;font-size:12px;color:var(--muted);margin-bottom:8px}.bar{height:11px;background:#130d22;border:1px solid var(--line);border-radius:999px;overflow:hidden}.fill{height:100%;width:0;background:linear-gradient(90deg,var(--purple),var(--cyan),var(--green));box-shadow:0 0 20px var(--cyan);transition:.35s}.nav{display:flex;flex-direction:column;gap:9px}.nav button{all:unset;cursor:pointer;border:1px solid var(--line);border-radius:16px;padding:13px 14px;background:rgba(255,255,255,.035);display:grid;grid-template-columns:34px 1fr auto;gap:10px;align-items:center;transition:.2s}.nav button:hover{border-color:rgba(0,240,255,.5);transform:translateX(3px)}.nav button.active{background:linear-gradient(135deg,rgba(209,30,255,.28),rgba(0,240,255,.12));border-color:rgba(255,62,219,.7);box-shadow:0 0 22px rgba(209,30,255,.16)}.nav .badge{width:31px;height:31px;border-radius:11px;display:grid;place-items:center;background:#090412;border:1px solid rgba(255,255,255,.12);font-weight:900}.nav small{color:var(--muted);display:block;margin-top:2px;font-size:11px}.check{color:var(--green);font-weight:900}.main{padding:34px;overflow:hidden}.hero{border:1px solid rgba(255,255,255,.12);background:linear-gradient(135deg,rgba(13,7,24,.94),rgba(6,1,12,.92));border-radius:32px;padding:30px;box-shadow:0 0 60px rgba(0,240,255,.06);position:relative;overflow:hidden}.hero:after{content:"";position:absolute;inset:auto -20% -45% auto;width:480px;height:480px;background:radial-gradient(circle,rgba(255,62,219,.25),transparent 60%);pointer-events:none}.pill{display:inline-flex;align-items:center;gap:8px;border:1px solid rgba(0,240,255,.35);color:var(--cyan);padding:8px 12px;border-radius:999px;background:rgba(0,240,255,.06);font-size:12px;text-transform:uppercase;letter-spacing:.16em}.hero h2{font-size:clamp(34px,5vw,74px);line-height:.93;margin:18px 0;background:linear-gradient(90deg,var(--white),var(--cyan),var(--pink));-webkit-background-clip:text;color:transparent;max-width:980px}.hero p{color:var(--muted);font-size:18px;line-height:1.55;max-width:900px}.grid{display:grid;gap:18px}.two{grid-template-columns:1.15fr .85fr}.three{grid-template-columns:repeat(3,1fr)}.five{grid-template-columns:repeat(5,1fr)}.card{border:1px solid var(--line);background:linear-gradient(180deg,rgba(255,255,255,.055),rgba(255,255,255,.025));border-radius:24px;padding:22px;position:relative;overflow:hidden}.card h3{margin:0 0 10px;font-size:22px}.card p,.card li{color:var(--muted);line-height:1.55}.page{display:none;animation:pop .32s ease}.page.active{display:block}@keyframes pop{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:none}}.letter{font-size:50px;font-weight:950;background:linear-gradient(135deg,var(--purple),var(--cyan));-webkit-background-clip:text;color:transparent}.btns{display:flex;flex-wrap:wrap;gap:12px;margin-top:20px}.btn{all:unset;cursor:pointer;border-radius:16px;padding:13px 18px;font-weight:850;background:linear-gradient(135deg,var(--purple),var(--pink));color:#05000b;box-shadow:0 0 22px rgba(209,30,255,.25)}.btn.secondary{background:rgba(255,255,255,.06);color:var(--white);border:1px solid var(--line);box-shadow:none}.btn.cyan{background:linear-gradient(135deg,var(--cyan),var(--green));color:#04100e}.input,textarea,select{width:100%;background:#090412;border:1px solid rgba(255,255,255,.12);border-radius:16px;color:var(--white);padding:14px 15px;font:inherit;outline:none}textarea{min-height:110px;resize:vertical}.input:focus,textarea:focus,select:focus{border-color:var(--cyan);box-shadow:0 0 0 3px rgba(0,240,255,.08)}label{font-size:12px;letter-spacing:.13em;text-transform:uppercase;color:var(--cyan);display:block;margin:16px 0 8px}.choiceGrid{display:grid;grid-template-columns:repeat(auto-fit,minmax(210px,1fr));gap:14px}.choice{border:1px solid var(--line);border-radius:20px;padding:18px;background:#090412;cursor:pointer;transition:.18s}.choice:hover{border-color:var(--cyan);transform:translateY(-2px)}.choice.selected{border-color:var(--green);box-shadow:0 0 24px rgba(0,255,191,.16);background:linear-gradient(135deg,rgba(0,255,191,.13),rgba(0,240,255,.05))}.micro{font-size:12px;color:var(--muted)}.quote{font-size:24px;line-height:1.3;color:var(--white);font-weight:800}.stat{border-left:3px solid var(--cyan);padding-left:15px}.stat b{font-size:27px;color:var(--white)}.trainingList{display:grid;gap:12px;margin-top:14px}.trainingStep{display:grid;grid-template-columns:42px 1fr;gap:13px;padding:15px;border:1px solid var(--line);background:#090412;border-radius:18px}.num{width:42px;height:42px;border-radius:14px;background:linear-gradient(135deg,var(--purple),var(--cyan));display:grid;place-items:center;color:#05000b;font-weight:950}.moduleHeader{display:flex;justify-content:space-between;gap:18px;align-items:flex-start;margin-bottom:22px}.moduleHeader h2{font-size:42px;margin:5px 0}.tag{display:inline-block;background:rgba(255,62,219,.12);border:1px solid rgba(255,62,219,.35);color:var(--pink);padding:8px 10px;border-radius:999px;font-size:12px;font-weight:800}.completeBox{margin-top:18px;border:1px dashed rgba(0,255,191,.45);background:rgba(0,255,191,.05);border-radius:22px;padding:18px}.footerActions{position:sticky;bottom:0;margin-top:26px;padding:18px;background:linear-gradient(180deg,transparent,rgba(5,0,11,.96) 25%);display:flex;justify-content:space-between;gap:12px}.certificate{background:radial-gradient(circle at top,rgba(0,240,255,.17),transparent 40%),linear-gradient(135deg,rgba(209,30,255,.12),rgba(255,62,219,.06));border:1px solid rgba(0,240,255,.28);border-radius:34px;padding:34px;text-align:center}.certificate h2{font-size:52px;margin:12px 0;background:linear-gradient(90deg,var(--cyan),var(--pink));-webkit-background-clip:text;color:transparent}@media(max-width:900px){.app{display:block}.sidebar{position:relative;height:auto}.main{padding:18px}.two,.three,.five{grid-template-columns:1fr}.hero h2{font-size:42px}.moduleHeader{display:block}.footerActions{position:relative}.nav{max-height:420px;overflow:auto}}
</style>
</head>
<body>
<div class="app">
<aside class="sidebar">
  <div class="brand"><div class="logo">B</div><div><div class="kicker">Execution Engine</div><h1>B.L.A.Z.E. Training OS</h1></div></div>
  <div class="progressShell"><div class="progressTop"><span>Training Progress</span><b id="progressText">0%</b></div><div class="bar"><div class="fill" id="progressFill"></div></div></div>
  <nav class="nav" id="nav"></nav>
</aside>
<main class="main" id="main"></main>
</div>
<script>
const STORAGE_KEY='blazeRealTrainingOS.v1';
const pages=[
 {id:'overview',badge:'🔥',title:'Blaze Overview',small:'The engine',letter:'BLAZE'},
 {id:'being',badge:'B',title:'Being',small:'Identity before action',letter:'B'},
 {id:'leadership',badge:'L',title:'Leadership',small:'Self-command',letter:'L'},
 {id:'alignment',badge:'A',title:'Alignment',small:'Values into motion',letter:'A'},
 {id:'zeal',badge:'Z',title:'Zeal',small:'Fire without burnout',letter:'Z'},
 {id:'execution',badge:'E',title:'Execution',small:'Proof, reps, results',letter:'E'},
 {id:'integration',badge:'∞',title:'Integration Lab',small:'Run the loop',letter:'∞'},
 {id:'recap',badge:'🏆',title:'Final Recap',small:'Lock it in',letter:'✓'}
];
const modules={
being:{name:'Being',thesis:'Your results will always match your identity. Before you chase action, choose the version of you who is leading the action.',learn:['Being is not a mood. It is the identity you operate from under pressure.','The Survival Being waits for permission, certainty, and comfort. The Boss Being chooses, moves, and owns the outcome.','The fastest shift is language: replace “I should” with “I choose,” “I hope” with “I will,” and “I’m trying” with “I’m training.”'],drill:'Before your day starts, write: “Today I am being the person who ____ even when ____.”',prompt:'Who do you need to BE today before you execute? What old identity are you refusing to let lead?',stand:['The Boss','The Builder','The Closer','The Coachable Student','The Calm Leader']},
leadership:{name:'Leadership',thesis:'Leadership is not a title. It is the ability to direct your state, decisions, conversations, and future.',learn:['Leadership starts with self-command: you do what you said you would do when the feeling is gone.','A leader does not react to the day. A leader frames the day.','In sales, leadership means guiding the client to clarity without pressure, force, or fake energy.'],drill:'Write the conversation, decision, or moment you need to lead today — then define the standard you will hold.',prompt:'Where are you currently reacting when you should be leading?',stand:['Direct','Decisive','Grounded','Responsible','Unshakeable']},
alignment:{name:'Alignment',thesis:'No more hustle for hustle’s sake. Alignment means your actions match your values, vision, and real target.',learn:['Misalignment creates friction: you can work hard and still feel off because the work is pointed at the wrong life.','Aligned goals are specific, measurable, emotionally honest, and connected to who you are becoming.','Alignment removes the leak between what you say matters and what your calendar proves matters.'],drill:'Audit one goal: Does this match my values, my future vision, and the person I said I am becoming?',prompt:'What action would make today feel aligned instead of just busy?',stand:['Clear','Congruent','Focused','Values-Led','Locked In']},
zeal:{name:'Zeal',thesis:'Zeal is the intensity switch: passion, conviction, urgency, and commitment — without burning yourself out.',learn:['Zeal is not chaos. It is directed fire.','Burnout comes from unmanaged pressure. Zeal comes from meaningful mission plus regulated energy.','The strongest performers know how to turn it on, reset fast, and return with power.'],drill:'Choose a power phrase for today and attach it to one action you will complete before the day ends.',prompt:'What are you willing to bring real fire to today — and how will you protect your energy while doing it?',stand:['On Fire','Committed','Courageous','Alive','All In']},
execution:{name:'Execution',thesis:'Execution turns identity into evidence. No more overthinking — proof, reps, results.',learn:['Execution beats intention every time. A goal without a next rep is just a wish.','Implementation intentions work because they pre-decide behavior: If X happens, then I will do Y.','Daily proof builds identity. Every completed rep tells your nervous system: this is who I am now.'],drill:'Write one if-then plan: “If ____ happens today, then I will ____.” Then complete one proof rep.',prompt:'What is the one rep that would prove you are not just thinking about change — you are becoming it?',stand:['Fast Mover','Finisher','Operator','Proof Builder','Relentless']}
};
let state=JSON.parse(localStorage.getItem(STORAGE_KEY)||'{}');
state.answers=state.answers||{};state.done=state.done||{};state.current=state.current||'overview';
function save(){localStorage.setItem(STORAGE_KEY,JSON.stringify(state));renderNav();updateProgress();}
function setPage(id){state.current=id;save();renderMain();window.scrollTo({top:0,behavior:'smooth'});}
function updateProgress(){const done=pages.filter(p=>state.done[p.id]).length;const pct=Math.round(done/pages.length*100);document.getElementById('progressText').textContent=pct+'%';document.getElementById('progressFill').style.width=pct+'%';}
function renderNav(){document.getElementById('nav').innerHTML=pages.map(p=>`<button class="${state.current===p.id?'active':''}" onclick="setPage('${p.id}')"><span class="badge">${p.badge}</span><span>${p.title}<small>${p.small}</small></span><span class="check">${state.done[p.id]?'✓':''}</span></button>`).join('');}
function field(id,label,placeholder,type='textarea'){const val=(state.answers[id]||'').replaceAll('"','&quot;');return `<label>${label}</label>${type==='textarea'?`<textarea placeholder="${placeholder}" oninput="state.answers['${id}']=this.value;save()">${state.answers[id]||''}</textarea>`:`<input class="input" value="${val}" placeholder="${placeholder}" oninput="state.answers['${id}']=this.value;save()" />`}`}
function choices(id,items){return `<div class="choiceGrid">${items.map(x=>`<div class="choice ${(state.answers[id]===x)?'selected':''}" onclick="state.answers['${id}']='${x}';save();renderMain()"><b>${x}</b><p class="micro">Choose this as today’s operating state.</p></div>`).join('')}</div>`}
function modulePage(key){const m=modules[key];return `<section class="page active"><div class="moduleHeader"><div><span class="tag">B.L.A.Z.E. Pillar</span><h2><span class="letter">${key[0].toUpperCase()}</span> ${m.name}</h2><p class="quote">${m.thesis}</p></div><button class="btn secondary" onclick="state.done['${key}']=!state.done['${key}'];save();renderMain()">${state.done[key]?'Completed ✓':'Mark Complete'}</button></div><div class="grid two"><div class="card"><h3>Training</h3><div class="trainingList">${m.learn.map((l,i)=>`<div class="trainingStep"><div class="num">${i+1}</div><p>${l}</p></div>`).join('')}</div></div><div class="card"><h3>Choose Your ${m.name} Stand</h3>${choices(key+'_stand',m.stand)}<div class="completeBox"><b>Micro Drill</b><p>${m.drill}</p></div></div></div><div class="grid two" style="margin-top:18px"><div class="card"><h3>Coaching Prompt</h3><p>${m.prompt}</p>${field(key+'_reflection','Your Answer','Write the honest answer here...')}</div><div class="card"><h3>Proof Rep</h3>${field(key+'_proof','Today’s proof','What action will prove this pillar today?')}<label>Completion Evidence</label><input class="input" placeholder="Example: 30 doors knocked, pitch practiced, hard conversation had..." value="${state.answers[key+'_evidence']||''}" oninput="state.answers['${key}_evidence']=this.value;save()" /></div></div></section>`}
function renderMain(){let html='';
if(state.current==='overview') html=`<section class="page active"><div class="hero"><span class="pill">Framework Training • Not Motivation</span><h2>B.L.A.Z.E. turns identity into execution.</h2><p>This training is built around one engine: <b>Being, Leadership, Alignment, Zeal, Execution.</b> It is designed to help someone choose who they are being, lead themselves, align the target, bring directed fire, and create proof through action.</p><div class="btns"><button class="btn" onclick="setPage('being')">Start Training</button><button class="btn secondary" onclick="state.done['overview']=true;save();renderMain()">Mark Overview Complete</button></div></div><div class="grid five" style="margin-top:18px">${Object.keys(modules).map(k=>`<div class="card"><div class="letter">${k[0].toUpperCase()}</div><h3>${modules[k].name}</h3><p>${modules[k].thesis}</p></div>`).join('')}</div><div class="grid three" style="margin-top:18px"><div class="card stat"><b>85%</b><p>ICF reports 85% of coaches say clients want mental well-being support.</p></div><div class="card stat"><b>$5.34B</b><p>ICF’s 2025 Global Coaching Study reported global coaching revenue of $5.34B USD.</p></div><div class="card stat"><b>d=.65</b><p>Implementation-intention research found a medium-to-large effect on goal attainment.</p></div></div></section>`;
else if(modules[state.current]) html=modulePage(state.current);
else if(state.current==='integration') html=`<section class="page active"><div class="moduleHeader"><div><span class="tag">Integration</span><h2><span class="letter">∞</span> The Blaze Loop</h2><p class="quote">Choose → Clarify → Commit → Execute → Integrate.</p></div><button class="btn secondary" onclick="state.done.integration=!state.done.integration;save();renderMain()">${state.done.integration?'Completed ✓':'Mark Complete'}</button></div><div class="grid two"><div class="card"><h3>Run Today’s B.L.A.Z.E. Loop</h3>${field('loop_being','B — Who am I being today?','Example: I am being a calm closer who moves before fear talks me out of it.')}${field('loop_leadership','L — What must I lead?','Example: I must lead my energy and one hard conversation.')}${field('loop_alignment','A — What action is aligned?','Example: 40 quality conversations, not busy work.')}${field('loop_zeal','Z — What fire am I bringing?','Example: urgency without panic, conviction without pressure.')}${field('loop_execution','E — What proof rep will be complete today?','Example: pitch roleplay + first 20 doors before 4 PM.')}</div><div class="card"><h3>Blaze Score</h3><p>Score each pillar 1–10. The weakest score becomes the training focus.</p>${['being','leadership','alignment','zeal','execution'].map(k=>`<label>${modules[k].name} Score</label><input type="range" min="1" max="10" value="${state.answers[k+'_score']||5}" oninput="state.answers['${k}_score']=this.value;this.nextElementSibling.textContent=this.value;save()"/><b>${state.answers[k+'_score']||5}</b>`).join('')}</div></div></section>`;
else html=`<section class="page active"><div class="certificate"><span class="pill">B.L.A.Z.E. Recap</span><h2>Training Locked In</h2><p class="quote">You do not need more hype. You need a state, a standard, a target, a fire, and a rep.</p><div class="grid five" style="margin-top:22px;text-align:left">${Object.keys(modules).map(k=>`<div class="card"><h3>${k[0].toUpperCase()} — ${modules[k].name}</h3><p>${state.answers[k+'_reflection']||'No answer yet.'}</p></div>`).join('')}</div><div class="btns" style="justify-content:center"><button class="btn cyan" onclick="state.done.recap=true;save();renderMain()">Complete B.L.A.Z.E. Training</button><button class="btn secondary" onclick="localStorage.removeItem(STORAGE_KEY);location.reload()">Reset Training</button></div></div></section>`;
const idx=pages.findIndex(p=>p.id===state.current);const prev=pages[Math.max(0,idx-1)].id,next=pages[Math.min(pages.length-1,idx+1)].id;document.getElementById('main').innerHTML=html+`<div class="footerActions"><button class="btn secondary" onclick="setPage('${prev}')">← Previous</button><button class="btn" onclick="state.done['${state.current}']=true;save();setPage('${next}')">Complete & Continue →</button></div>`;}
renderNav();updateProgress();renderMain();
</script>
</body>
</html>
