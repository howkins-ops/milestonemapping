<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>Milestone Mapping — Asset Gallery</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: #050007;
    color: #F2F0F4;
    font-family: system-ui, sans-serif;
    padding: 24px;
  }
  h1 {
    font-size: 22px;
    font-weight: 800;
    letter-spacing: -0.02em;
    margin-bottom: 6px;
    background: linear-gradient(90deg, #7B2CFF, #D11EFF, #00F0FF);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }
  .subtitle { font-size: 13px; color: rgba(242,240,244,0.5); margin-bottom: 28px; }
  .batch {
    margin-bottom: 40px;
  }
  .batch-title {
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: rgba(0,240,255,0.7);
    margin-bottom: 14px;
    padding-bottom: 8px;
    border-bottom: 1px solid rgba(123,44,255,0.2);
  }
  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
    gap: 10px;
  }
  .grid.wide {
    grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
  }
  .tile {
    background: rgba(9,2,20,0.92);
    border: 1px solid rgba(123,44,255,0.22);
    border-radius: 10px;
    overflow: hidden;
    cursor: pointer;
    transition: border-color 0.15s, transform 0.15s;
  }
  .tile:hover {
    border-color: rgba(0,240,255,0.5);
    transform: translateY(-2px);
  }
  .tile img {
    width: 100%;
    display: block;
    background: repeating-conic-gradient(#111 0% 25%, #1a1a1a 0% 50%) 0 0 / 16px 16px;
  }
  .tile-label {
    padding: 6px 8px;
    font-size: 10px;
    color: rgba(242,240,244,0.5);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  /* Lightbox */
  #lb { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.92); z-index: 999; align-items: center; justify-content: center; cursor: zoom-out; }
  #lb.open { display: flex; }
  #lb img { max-width: 90vw; max-height: 90vh; border-radius: 10px; box-shadow: 0 0 60px rgba(0,240,255,0.2); }
  #lb-name { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); font-size: 12px; color: rgba(242,240,244,0.6); background: rgba(0,0,0,0.6); padding: 6px 14px; border-radius: 20px; }
  .missing { opacity: 0.3; filter: grayscale(1); }
  .missing .tile-label { color: rgba(255,62,62,0.6); }
</style>
</head>
<body>

const container = document.body;
let total = 0, loaded = 0;

BATCHES.forEach(batch => {
  const section = document.createElement('div');
  section.className = 'batch';
  section.innerHTML = `<div class="batch-title">${batch.title}</div>`;
  const grid = document.createElement('div');
  grid.className = 'grid' + (batch.wide ? ' wide' : '');

  batch.images.forEach(path => {
    total++;
    const tile = document.createElement('div');
    tile.className = 'tile';
    const name = path.split('/').pop();
    tile.innerHTML = `
      <img src="${BASE}/${path}" alt="${name}" loading="lazy" onerror="this.closest('.tile').classList.add('missing')" onload="onImgLoad()" />
      <div class="tile-label">${name}</div>
    `;
    tile.addEventListener('click', () => openLightbox(`${BASE}/${path}`, name));
    grid.appendChild(tile);
  });

  section.appendChild(grid);
  container.appendChild(section);
});

function onImgLoad() {
  loaded++;
  document.title = `Asset Gallery (${loaded}/${total} loaded)`;
}

const lb = document.getElementById('lb');
const lbImg = document.getElementById('lb-img');
const lbName = document.getElementById('lb-name');

function openLightbox(src, name) {
  lbImg.src = src;
  lbName.textContent = name;
  lb.classList.add('open');
}
lb.addEventListener('click', () => lb.classList.remove('open'));
document.addEventListener('keydown', e => { if (e.key === 'Escape') lb.classList.remove('open'); });

</html>
